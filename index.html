<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Canada Trade Intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🇨🇦 Canada Trade Intelligence</h1>

<!-- KPI -->
<div class="kpi-container">
    <div class="kpi">
        <h3>Imports</h3>
        <p id="kpi-imports"></p>
    </div>
    <div class="kpi">
        <h3>Exports</h3>
        <p id="kpi-exports"></p>
    </div>
    <div class="kpi">
        <h3>Balance</h3>
        <p id="kpi-balance"></p>
    </div>
</div>

<!-- Monthly -->
<div class="chart-container">
    <h2>Monthly Trade Trend</h2>
    <canvas id="monthlyChart"></canvas>
</div>

<!-- Countries -->
<div class="chart-container">
    <h2>Top Trade Partners</h2>
    <canvas id="countriesChart"></canvas>
</div>

<!-- Products -->
<div class="chart-container">
    <h2>Top Products (HS)</h2>
    <canvas id="productsChart"></canvas>
</div>

<script src="script.js"></script>

</body>
</html>
